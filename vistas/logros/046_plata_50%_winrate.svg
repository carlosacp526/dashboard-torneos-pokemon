<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg46" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#28283A"/>
      <stop offset="100%" stop-color="#1A1A20"/>
    </radialGradient>
    <radialGradient id="ring46" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#C8D0E0"/>
      <stop offset="100%" stop-color="#A0A8B8"/>
    </radialGradient>
  </defs>

  <!-- Fondo -->
  <rect width="200" height="200" rx="18" fill="url(#bg46)"/>

  <!-- Anillo exterior decorativo -->
  <circle cx="100" cy="86" r="58" fill="none" stroke="#A0A8B8" stroke-width="2.5" opacity="0.4"/>
  <circle cx="100" cy="86" r="54" fill="none" stroke="#C8D0E0" stroke-width="1" opacity="0.25"/>

  <!-- Círculo principal -->
  <circle cx="100" cy="86" r="48" fill="url(#ring46)" opacity="0.18"/>
  <circle cx="100" cy="86" r="44" fill="#28283A" stroke="#A0A8B8" stroke-width="2"/>

  <!-- Destellos en el anillo -->
  <circle cx="100" cy="42" r="3" fill="#E8EDF5" opacity="0.9"/>
  <circle cx="144" cy="86" r="2.5" fill="#C8D0E0" opacity="0.7"/>
  <circle cx="56"  cy="86" r="2.5" fill="#C8D0E0" opacity="0.7"/>
  <circle cx="100" cy="130" r="2" fill="#E8EDF5" opacity="0.5"/>

  <!-- Ícono central -->
  <g transform="translate(100,86)" fill="#C8D0E0" stroke="#A0A8B8" stroke-width="0.8">
    <polyline points="-14,10 -8,-2 -2,6 4,-10 10,2 14,-6" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/><line x1="-14" y1="14" x2="14" y2="14" stroke-width="1.5"/><line x1="-14" y1="-14" x2="-14" y2="14" stroke-width="1.5"/>
  </g>
  

  <!-- Línea decorativa -->
  <line x1="30" y1="150" x2="170" y2="150" stroke="#A0A8B8" stroke-width="0.8" opacity="0.5"/>
  <circle cx="30"  y1="150" cy="150" r="2" fill="#A0A8B8" opacity="0.6"/>
  <circle cx="170" cy="150" r="2" fill="#A0A8B8" opacity="0.6"/>

  <!-- Título -->
  <text x="100" y="165" text-anchor="middle" font-family="Arial,sans-serif"
        font-size="11" font-weight="bold" fill="#F0F4FF" letter-spacing="0.3">50% winrate</text>

  <!-- Subtítulo -->
  <text x="100" y="180" text-anchor="middle" font-family="Arial,sans-serif"
        font-size="8.5" fill="#A0A8C0" letter-spacing="0.2">Equilibrio perfecto</text>

  <!-- Número de logro -->
  <text x="16" y="17" font-family="Arial,sans-serif" font-size="8" fill="#A0A8B8" opacity="0.7">#046</text>

  <!-- Tier badge -->
  <rect x="142" y="6" width="52" height="14" rx="7" fill="#A0A8B8" opacity="0.25"/>
  <text x="168" y="16" text-anchor="middle" font-family="Arial,sans-serif"
        font-size="8" font-weight="bold" fill="#C8D0E0" letter-spacing="0.5">PLATA</text>
</svg>