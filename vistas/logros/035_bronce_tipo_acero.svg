<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg35" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#3D2410"/>
      <stop offset="100%" stop-color="#2C1A0E"/>
    </radialGradient>
    <radialGradient id="ring35" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#E8A04A"/>
      <stop offset="100%" stop-color="#CD7F32"/>
    </radialGradient>
  </defs>

  <!-- Fondo -->
  <rect width="200" height="200" rx="18" fill="url(#bg35)"/>

  <!-- Anillo exterior decorativo -->
  <circle cx="100" cy="86" r="58" fill="none" stroke="#CD7F32" stroke-width="2.5" opacity="0.4"/>
  <circle cx="100" cy="86" r="54" fill="none" stroke="#E8A04A" stroke-width="1" opacity="0.25"/>

  <!-- Círculo principal -->
  <circle cx="100" cy="86" r="48" fill="url(#ring35)" opacity="0.18"/>
  <circle cx="100" cy="86" r="44" fill="#3D2410" stroke="#CD7F32" stroke-width="2"/>

  <!-- Destellos en el anillo -->
  <circle cx="100" cy="42" r="3" fill="#F5C17A" opacity="0.9"/>
  <circle cx="144" cy="86" r="2.5" fill="#E8A04A" opacity="0.7"/>
  <circle cx="56"  cy="86" r="2.5" fill="#E8A04A" opacity="0.7"/>
  <circle cx="100" cy="130" r="2" fill="#F5C17A" opacity="0.5"/>

  <!-- Ícono central -->
  <g transform="translate(100,86)" fill="#E8A04A" stroke="#CD7F32" stroke-width="0.8">
    <path d="M-12,-12 L-12,4 Q-12,16 0,16 Q12,16 12,4 L12,-12 L7,-12 L7,4 Q7,11 0,11 Q-7,11 -7,4 L-7,-12 Z" fill-opacity="0.3" stroke-width="1.5"/><rect x="-14" y="-16" width="6" height="6" rx="1"/><rect x="8" y="-16" width="6" height="6" rx="1"/>
  </g>
  

  <!-- Línea decorativa -->
  <line x1="30" y1="150" x2="170" y2="150" stroke="#CD7F32" stroke-width="0.8" opacity="0.5"/>
  <circle cx="30"  y1="150" cy="150" r="2" fill="#CD7F32" opacity="0.6"/>
  <circle cx="170" cy="150" r="2" fill="#CD7F32" opacity="0.6"/>

  <!-- Título -->
  <text x="100" y="165" text-anchor="middle" font-family="Arial,sans-serif"
        font-size="11" font-weight="bold" fill="#F5DEB3" letter-spacing="0.3">Tipo Acero</text>

  <!-- Subtítulo -->
  <text x="100" y="180" text-anchor="middle" font-family="Arial,sans-serif"
        font-size="8.5" fill="#C8A060" letter-spacing="0.2">5 victorias acero</text>

  <!-- Número de logro -->
  <text x="16" y="17" font-family="Arial,sans-serif" font-size="8" fill="#CD7F32" opacity="0.7">#035</text>

  <!-- Tier badge -->
  <rect x="142" y="6" width="52" height="14" rx="7" fill="#CD7F32" opacity="0.25"/>
  <text x="168" y="16" text-anchor="middle" font-family="Arial,sans-serif"
        font-size="8" font-weight="bold" fill="#E8A04A" letter-spacing="0.5">BRONCE</text>
</svg>